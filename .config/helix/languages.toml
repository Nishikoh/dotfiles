# [[language]]
# # https://github.com/helix-editor/helix/discussions/8850 既存の言語のlsp設定が上書きされてしまう
# name = "all-files"
# scope = ""
# file-types = [{glob = "*"}]
# language-servers = ["typos-lsp"]

[language-server.typos-lsp]
command = "sh"
args = ["-c", "mise exec github:tekumara/typos-lsp -- typos-lsp"]

[language-server.copilot]
command = "npx"
args = ["@github/copilot-language-server", "--stdio"]

[[language]]
name = "python"
language-servers = ["ty","ruff","copilot", "typos-lsp"]
auto-format = true

[language-server.ty]
command = "sh"
args = ["-c", "mise exec ty -- ty server"]

[language-server.ty.config]
inlayHints.callArgumentNames = true
experimental.rename = true
experimental.autoImport = true

[language-server.ruff]
command = "sh"
args = ["-c", "mise exec ruff -- ruff server"]

[[language]]
name = "hcl"
language-servers = ["terraform-ls", "copilot", "typos-lsp"]
language-id = "terraform"
auto-format = true

[[language]]
name = "tfvars"
language-servers = ["terraform-ls", "copilot", "typos-lsp"]
language-id = "terraform-vars"

[language-server.terraform-ls]
command = "sh"
args = ["-c","mise exec terraform-ls -- terraform-ls serve"]
# config.indexing.ignorePaths = ["ignore.hcl"]

[language-server.sqls]
command = "sh"
args =["-c","mise exec github:sqls-server/sqls -- sqls"]

[[language]]
name = "sql"
language-servers = [ "sqls" , "typos-lsp"]
auto-format = false

[[language]]
name = "typescript"
language-servers = ["typescript-language-server", "oxfmt", "oxlint", "copilot", "typos-lsp"]
auto-format = true

[language-server.typescript-language-server]
command = "sh"
args =["-c","mise exec npm:typescript npm:typescript-language-server -- typescript-language-server --stdio"]

[language-server.oxfmt]
command = "sh"
args =["-c","bunx oxfmt --lsp"]

[language-server.oxlint]
command = "sh"
args =["-c","bunx oxlint --lsp"]

[language-server.marksman]
command = "sh"
args =["-c","mise exec marksman -- marksman server"]

[[language]]
name = "markdown"
language-servers = ["marksman", "typos-lsp"]
scope = ""
file-types = [{glob = "*.md"}]
auto-format = true

[language-server.bash-language-server]
command = "sh"
args =["-c","mise exec npm:bash-language-server -- bash-language-server start"]

[[language]]
name = "bash"
language-servers = ["bash-language-server", "typos-lsp"]
auto-format = true

[language-server.gopls]
command = "sh"
args =["-c","CGO_ENABLED=0 mise exec go:golang.org/x/tools/gopls -- gopls"]

[language-server.golangci-lint-lsp]
command = "sh"
args =["-c","CGO_ENABLED=0 mise exec go:github.com/nametake/golangci-lint-langserver -- golangci-lint-langserver"]

[language-server.golangci-lint-lsp.config]
command = "sh"
args =["-c","CGO_ENABLED=0 mise exec go: github.com/golangci/golangci-lint/v2/cmd/golangci-lint -- golangci-lint run --output.json.path=stdout --show-stats=false --issues-exit-code=1"]

[[language]]
name = "go"
auto-format = true
